<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Inspos</title>
	<link 
	href="https://fonts.googleapis.com/css2?family=Rubik+Burned&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
<style>
	
* {margin: 0; padding: 0;}
	} @font-face {
        font-family: Roboto Mono;
        src: url("RobotoMono-VariableFont_wght.ttf");
    } body {
        background: lavenderblush;
    } #page {
        width: 1024px;
        height: 1325px;
        background: white;
        border: 1px solid darkgray;
        box-shadow: 2px 3px 6px darkgray;
        margin: 24px auto;
   } #banner {
        width: 1024px;
  } h1 {
        font: 48pt/1.4em 'Rubik Burned';
        text-align: center;
        margin: 54px 0 0 0;
        color: deeppink;
        text-shadow: 2px 3px 6px purple;
    } p {
        font: 13pt/1.4em Roboto Mono;
        width: 768px;
        margin: 24px auto;
		text-align: center;
    } .float-left {
        width: 300px;
        float: left;
        margin: 0 24px 0 0;
        border: 1px solid darkgray;
        box-shadow: 2px 3px 6px darkgray;
    } ul {
        width: 100%;
        margin-top: -4px;
    } li {
        font: 14pt/2.0em Roboto Mono;
        list-style: none;
        float
        width: 50%;
        height: 40px;
        text-align: center;
        background: hotpink;
    } li {
        color: white;
    } a {
        text-decoration: none;
    } li:hover, a li:hover {
        background: #FC8B48;
} #container {
	width: 800px;
	height: 800px;
	background: white;
	border: 1px solid white;
	margin: 24px auto;
	display: grid;
	grid-template: 400px 400px / 400px 400px;
} #container div {
	font: 72pt/1.4em Roboto Mono;
	background-repeat: no-repeat;
} #container div:nth-child(1) {
	background: url("1megumiwind.jpg");
	background-size: cover;
} #container div:nth-child(2) {
	background: url("ladyg copy.jpg");
	background-size: cover;
} #container div:nth-child(3) {
	background: url("3mibts.jpg");
	background-size: cover;
} #container div:nth-child(4) {
	background: url("lorderibscreensh.jpg");
	background-size: cover;
}
</style>
</head>

<body>
    <div id="page">
        <img id="banner" src="btsheader.jpg" />
        <ul>
			<a href="index.html">
			<li>Home</li></a>
        </ul>

        <h1>Inspo References</h1>
		<a> <p>Most of the artwork in my portfolio website was inspired by my love for music, anime, and concerts.</p> </a>

		<div></div>
		<div></div>
		<div></div>
    </div>
    </div>
</body>
</html>
